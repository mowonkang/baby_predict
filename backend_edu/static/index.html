<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6c5ce7" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="EduPath" />
  <title>EduPath — 학년별 할 일 + 과목 보완 추천</title>
  <style>
    :root{ --pri:#6c5ce7; --pri-d:#5a49d6; --bg:#f4f4fb; --card:#fff; --ink:#1f2230;
      --muted:#7a7f9a; --ok:#00b894; --warn:#e17055; --line:#e7e7f3; --study:#0984e3; --free:#00b894; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; }
    body{ font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:var(--bg); color:var(--ink); }
    .app{ max-width:480px; margin:0 auto; min-height:100vh; }
    header{ background:linear-gradient(135deg,var(--pri),#8e7bf0); color:#fff; padding:calc(18px + env(safe-area-inset-top)) 18px 18px; position:sticky; top:0; z-index:5; }
    .brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:19px; }
    .sub{ opacity:.9; font-size:12.5px; margin-top:4px; }
    .steps{ display:flex; gap:6px; margin-top:14px; }
    .steps i{ height:4px; flex:1; background:rgba(255,255,255,.35); border-radius:2px; }
    .steps i.on{ background:#fff; }
    main{ padding:16px; }
    .screen{ display:none; animation:fade .25s ease; } .screen.active{ display:block; }
    @keyframes fade{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .card{ background:var(--card); border-radius:16px; padding:18px; margin:0 0 14px; box-shadow:0 2px 10px rgba(40,40,90,.06); }
    h2{ font-size:18px; margin:2px 0 12px; } h3{ font-size:15px; margin:0 0 8px; }
    label{ display:block; font-size:13.5px; font-weight:700; margin:12px 0 6px; }
    input{ width:100%; padding:13px; border:1.5px solid var(--line); border-radius:11px; font-size:16px; }
    input:focus{ outline:none; border-color:var(--pri); }
    .hint{ color:var(--muted); font-size:12px; margin-top:4px; }
    .gradeTag{ display:inline-block; background:#f1eeff; color:var(--pri-d); font-weight:800; font-size:13px; padding:4px 12px; border-radius:11px; margin-top:8px; }
    .age-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:6px; }
    .age-grid button{ padding:12px 6px; border:1.5px solid var(--line); background:#fff; border-radius:11px; font-size:13px; cursor:pointer; line-height:1.3; }
    .age-grid button.sel{ border-color:var(--pri); background:#f1eeff; color:var(--pri-d); font-weight:700; }
    .age-grid button small{ display:block; color:var(--muted); font-size:11px; font-weight:400; }
    .btn{ width:100%; padding:15px; background:var(--pri); color:#fff; border:none; border-radius:13px; font-size:16px; font-weight:800; cursor:pointer; }
    .btn:disabled{ opacity:.45; }
    .btn.ghost{ background:#fff; color:var(--pri); border:1.5px solid var(--pri); margin-top:9px; }
    .cta{ position:sticky; bottom:0; background:linear-gradient(180deg,rgba(244,244,251,0),var(--bg) 30%); padding:12px 0 16px; }
    .glist{ list-style:none; padding:0; margin:8px 0 0; }
    .glist li{ padding:9px 12px; border-radius:10px; margin:6px 0; font-size:14px; background:#eef2fb; }
    .tip{ background:#fff7ed; border:1px solid #fde2c8; color:#9a5b1e; border-radius:11px; padding:11px 13px; font-size:13px; margin-top:10px; }
    .opts{ display:flex; flex-wrap:wrap; gap:8px; }
    .opt{ padding:11px 13px; border:1.5px solid var(--line); background:#fff; border-radius:12px; font-size:13.5px; cursor:pointer; }
    .opt.sel{ border-color:var(--pri); background:#f1eeff; color:var(--pri-d); font-weight:700; }
    /* 성취도 입력 */
    .subj-row{ display:flex; align-items:center; gap:8px; margin:8px 0; }
    .subj-row .nm{ width:54px; font-weight:700; font-size:13.5px; }
    .lvls{ display:flex; gap:6px; flex:1; }
    .lvls button{ flex:1; padding:9px 0; border:1.5px solid var(--line); background:#fff; border-radius:9px; font-size:12.5px; cursor:pointer; color:var(--muted); }
    .lvls button.good.sel{ background:var(--ok); color:#fff; border-color:var(--ok); }
    .lvls button.ok.sel{ background:#f6b93b; color:#fff; border-color:#f6b93b; }
    .lvls button.weak.sel{ background:var(--warn); color:#fff; border-color:var(--warn); }
    /* 결과 */
    .chips{ display:flex; flex-wrap:wrap; gap:6px; margin:6px 0; }
    .chip{ font-size:12px; background:#f0effb; color:#444; padding:4px 10px; border-radius:11px; }
    .chip.pri{ background:var(--pri); color:#fff; font-weight:700; }
    .riasec .row{ display:flex; align-items:center; gap:8px; margin:6px 0; font-size:12.5px; }
    .riasec .row span{ width:64px; color:var(--muted); }
    .bar{ flex:1; height:8px; background:#ece9f8; border-radius:5px; overflow:hidden; }
    .bar > i{ display:block; height:100%; background:var(--pri); }
    .track{ background:var(--ok); color:#fff; padding:12px 14px; border-radius:12px; font-weight:800; font-size:15px; }
    .mode{ background:#0984e3; color:#fff; padding:10px 13px; border-radius:11px; font-size:13px; margin-top:8px; }
    .rec{ border-left:4px solid var(--pri); padding:10px 12px; margin:9px 0; background:#fbfbff; border-radius:9px; }
    .rec .top{ display:flex; justify-content:space-between; gap:8px; align-items:baseline; }
    .rec .nm{ font-weight:700; font-size:14px; }
    .tag{ font-size:10.5px; padding:2px 8px; border-radius:10px; background:#efecff; color:var(--pri); white-space:nowrap; }
    .reasons{ margin:6px 0 0; padding-left:16px; color:var(--muted); font-size:12px; }
    .lvlbadge{ font-size:11px; font-weight:800; padding:2px 8px; border-radius:9px; color:#fff; }
    .lvlbadge.부족{ background:var(--warn); } .lvlbadge.보통{ background:#f6b93b; }
    .opt-line{ font-size:12.5px; margin:3px 0; }
    .free-cost{ color:var(--free); font-weight:800; }
    .paid-cost{ color:var(--muted); font-weight:700; }
    .subj{ display:inline-block; font-size:12px; background:#f1eeff; color:#3a3550; padding:5px 10px; border-radius:9px; margin:3px 5px 3px 0; }
    .muted{ color:var(--muted); font-size:12.5px; }
    svg.mind{ width:100%; height:auto; display:block; }
    .banner{ background:#fff3cd; border:1px solid #ffe08a; color:#7a5b00; padding:11px 13px; border-radius:11px; margin:0 0 12px; font-size:13.5px; cursor:pointer; }
    .life{ position:relative; padding-left:6px; }
    .lifeitem{ display:flex; gap:10px; align-items:flex-start; padding:6px 0; }
    .lifeitem .ld{ width:12px; height:12px; border-radius:50%; background:#d8d4f3; margin-top:3px; flex:none; border:2px solid #fff; box-shadow:0 0 0 2px #ece9f8; }
    .lifeitem.cur .ld{ background:var(--ok); box-shadow:0 0 0 3px #c7f0e3; }
    .lifeitem.cur b{ color:var(--pri-d); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">🎓 EduPath</div>
    <div class="sub">전 생애주기(0세~진로) · 이 시기 할 일 + 과목 보완(무료·저렴) + 성취 추적</div>
    <div class="steps"><i id="s0" class="on"></i><i id="s1"></i><i id="s2"></i><i id="s3"></i></div>
  </header>
  <main>
    <div id="promoBanner" class="banner" style="display:none"></div>
    <!-- 0: 나이 -->
    <section id="screen0" class="screen active">
      <div class="card">
        <h2>우리 아이는 지금 몇 살인가요?</h2>
        <div class="age-grid" id="ageGrid"></div>
        <input id="ageInput" type="number" min="3" max="25" placeholder="직접 입력 (만 나이)" style="margin-top:10px" />
        <label for="childName">아이 이름/별명 (이력 저장용, 선택)</label>
        <input id="childName" type="text" maxlength="20" placeholder="예: 우리아이 (성취도 변화를 기록해요)" />
        <label for="budget">월 교육비 예산 (선택)</label>
        <input id="budget" type="number" min="0" placeholder="예: 300000 (비우면 제한 없음)" />
        <p class="hint">입력 정보는 이 브라우저 안에만 저장됩니다(서버 전송 없음).</p>
      </div>
      <div class="cta"><button class="btn" id="toPlan" disabled>이 학년에 할 일 보기 →</button></div>
    </section>

    <!-- 1: 학년별 할 일 -->
    <section id="screen1" class="screen">
      <div class="card" id="planCard"><p class="muted">불러오는 중…</p></div>
      <div class="cta">
        <button class="btn" id="toInput">과목 수준·관심사 입력 →</button>
        <button class="btn ghost" id="toResultDirect">바로 결과 보기</button>
        <button class="btn ghost" id="back0">← 나이 다시 선택</button>
      </div>
    </section>

    <!-- 2: 성취도 + 관심사 -->
    <section id="screen2" class="screen">
      <div class="card">
        <h2>과목별 현재 수준</h2>
        <p class="hint">시험 점수가 없어도 느낌으로 OK. 부족한 과목엔 무료·저렴 교육을 추천해 드려요.</p>
        <div id="achv"></div>
      </div>
      <div class="card">
        <h3>좋아하는 활동 (선택)</h3>
        <p class="hint">우리 아이에게 맞는 걸 누르면 진로·계열이 맞춤으로 좁혀집니다.</p>
        <div class="opts" id="actOpts"></div>
        <h3 style="margin-top:14px">학습 성향 (해당되면)</h3>
        <div class="opts" id="styOpts"></div>
      </div>
      <div class="cta">
        <button class="btn" id="toResult">결과 보기 →</button>
        <button class="btn ghost" id="back1">← 이전</button>
      </div>
    </section>

    <!-- 3: 결과 -->
    <section id="screen3" class="screen">
      <div id="result"></div>
      <div class="cta"><button class="btn ghost" id="restart">처음부터 다시</button></div>
    </section>
  </main>
</div>

<script>
const state={ age:null, name:'', coreSubjects:[], achievements:{}, picks:new Set() };
const $=s=>document.querySelector(s);
const TYPE_LABEL={ national_pick:'인기', aptitude_match:'적성맞춤', stage_core:'단계핵심' };
const RIASEC={ realistic:'현실형 R', investigative:'탐구형 I', artistic:'예술형 A', social:'사회형 S', enterprising:'진취형 E', conventional:'관습형 C' };
const AGES=[ {v:1,t:'영아',s:'0~2세'},{v:5,t:'유치원',s:'4~6세'},{v:8,t:'초등 저',s:'1~2학년'},{v:10,t:'초등 중',s:'3~4학년'},
  {v:12,t:'초등 고',s:'5~6학년'},{v:14,t:'중학생',s:'중1~3'},{v:17,t:'고등학생',s:'고1~3'} ];
const LVLS=[['good','잘함'],['ok','보통'],['weak','부족']];

function setStep(n){
  ['screen0','screen1','screen2','screen3'].forEach((id,i)=>$('#'+id).classList.toggle('active',i===n));
  ['s0','s1','s2','s3'].forEach((id,i)=>$('#'+id).classList.toggle('on',i<=n));
  window.scrollTo({top:0});
}
function payload(){
  const b=parseInt($('#budget').value,10);
  const p={ age_years:state.age, interests:[...state.picks], achievements:state.achievements };
  if(b) p.budget_max=b;
  return p;
}
const post=(url)=>fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())}).then(r=>r.json());
const esc=t=>String(t).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const short=(t,n)=>{ t=String(t); return t.length>n?t.slice(0,n-1)+'…':t; };

// 0
function renderAges(){
  const g=$('#ageGrid');
  AGES.forEach(a=>{ const b=document.createElement('button'); b.innerHTML=`${a.t}<small>${a.s}</small>`;
    b.onclick=()=>{ state.age=a.v; $('#ageInput').value=''; [...g.children].forEach(c=>c.classList.remove('sel')); b.classList.add('sel'); $('#toPlan').disabled=false; };
    g.appendChild(b); });
}
$('#ageInput').addEventListener('input',e=>{ const v=parseInt(e.target.value,10);
  [...$('#ageGrid').children].forEach(c=>c.classList.remove('sel'));
  state.age=(v>=3&&v<=25)?v:null; $('#toPlan').disabled=!state.age; });

// 1 학년별 할 일
function planHTML(gp){
  return `<div class="gradeTag">${gp.grade} · ${gp.level}</div>
    <h3 style="margin-top:10px">📒 이 학년에 이렇게 하세요</h3>
    <ul class="glist">${gp.todo.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
    <div class="tip">💡 ${esc(gp.tip)}</div>`;
}
async function loadPlan(){
  const gp=await post('/api/grade-plan');
  state.coreSubjects=gp.subjects;
  $('#planCard').innerHTML=planHTML(gp);
}

// 2 성취도 + 관심사
function renderAchv(){
  const wrap=$('#achv'); wrap.innerHTML='';
  state.coreSubjects.forEach(subj=>{
    const row=document.createElement('div'); row.className='subj-row';
    row.innerHTML=`<div class="nm">${subj}</div>`;
    const box=document.createElement('div'); box.className='lvls';
    LVLS.forEach(([k,lbl])=>{ const b=document.createElement('button'); b.className=k; b.textContent=lbl;
      b.onclick=()=>{ state.achievements[subj]=lbl; [...box.children].forEach(c=>c.classList.remove('sel')); b.classList.add('sel'); };
      box.appendChild(b); });
    row.appendChild(box); wrap.appendChild(row);
  });
}
async function loadActivities(){
  const data=await (await fetch('/api/activities')).json();
  const mk=o=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=o.label;
    b.onclick=()=>{ b.classList.toggle('sel'); state.picks.has(o.id)?state.picks.delete(o.id):state.picks.add(o.id); }; return b; };
  const ao=$('#actOpts'); ao.innerHTML=''; data.interests.forEach(o=>ao.appendChild(mk(o)));
  const so=$('#styOpts'); so.innerHTML=''; data.styles.forEach(o=>so.appendChild(mk(o)));
}

// 마인드맵
function mindmap(pw){
  const ms=pw.milestones, n=ms.length;
  const W=380, top=24, gap=Math.max(58,Math.min(74,260/Math.max(1,n-1)));
  const H=top*2+(n-1)*gap+20, cy=H/2, cx=78, nx=196, nw=168;
  let s=`<svg class="mind" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="inherit">`;
  ms.forEach((m,i)=>{ const y=top+i*gap+14; s+=`<path d="M ${cx+58} ${cy} C ${cx+110} ${cy}, ${nx-30} ${y}, ${nx} ${y}" stroke="#cfc9f3" stroke-width="2" fill="none"/>`; });
  s+=`<g><rect x="${cx-58}" y="${cy-26}" width="116" height="52" rx="14" fill="#00b894"/>
    <text x="${cx}" y="${cy-4}" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">추천 계열</text>
    <text x="${cx}" y="${cy+12}" fill="#fff" font-size="10" text-anchor="middle">${esc(short(pw.recommended_track,12))}</text></g>`;
  ms.forEach((m,i)=>{ const y=top+i*gap+14, cur=i===0;
    s+=`<g><rect x="${nx}" y="${y-20}" width="${nw}" height="40" rx="12" fill="${cur?'#6c5ce7':'#efecff'}"/>
      <text x="${nx+12}" y="${y-3}" fill="${cur?'#fff':'#3a3550'}" font-size="11.5" font-weight="700">${esc(m.stage)}${cur?' ·지금':''}</text>
      <text x="${nx+12}" y="${y+12}" fill="${cur?'#e8e4ff':'#7a7f9a'}" font-size="10">${esc(short((m.focus||[])[0]||'',16))}</text></g>`; });
  return s+`</svg>`;
}

// 성취도 이력 (브라우저 localStorage)
const childKey=()=>'edupath_hist_'+(state.name||'우리아이');
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(childKey())||'[]'); }catch(e){ return []; } }
function saveHistory(grade){
  if(!Object.keys(state.achievements).length) return;  // 성취도 입력 없으면 저장 안 함
  const hist=loadHistory();
  const date=new Date().toISOString().slice(0,10);
  hist.push({ date, age:state.age, grade, ach:{...state.achievements} });
  try{ localStorage.setItem(childKey(), JSON.stringify(hist.slice(-20))); }catch(e){}
}
const lvlNum=l=>({부족:0,보통:1,잘함:2}[l] ?? -1);
function historyHTML(){
  const h=loadHistory(); if(!h.length) return '';
  const recent=h.slice(-6).reverse();
  let s=`<div class="card"><h3>📈 성취도 이력 — ${esc(state.name||'우리아이')}</h3>`;
  recent.forEach((e,i)=>{
    const prev=recent[i+1];
    s+=`<div style="margin:7px 0"><b>${e.date}</b> <span class="muted">· ${e.grade}</span><div class="chips" style="margin-top:3px">`;
    Object.entries(e.ach).forEach(([sub,lv])=>{
      let arrow=''; if(prev&&prev.ach[sub]!=null){ const d=lvlNum(lv)-lvlNum(prev.ach[sub]); arrow=d>0?' ↑':d<0?' ↓':''; }
      s+=`<span class="chip">${esc(sub)}: ${esc(lv)}${arrow}</span>`;
    });
    s+=`</div></div>`;
  });
  return s+`<div class="muted">결과를 볼 때마다 자동 저장돼요. 이 브라우저에만 보관(서버 전송 없음).</div></div>`;
}
const optLink=o=>o.url?`<a href="${esc(o.url)}" target="_blank" rel="noopener">${esc(o.name)}</a>`:esc(o.name);

// ⑥ 학년 진급 알림 (재방문 시 추정)
function gradeLabel(a){
  const m={7:'초1',8:'초2',9:'초3',10:'초4',11:'초5',12:'초6',13:'중1',14:'중2',15:'중3',16:'고1',17:'고2'};
  if(a<=2)return '영아'; if(a<=6)return '유치원'; if(a>=18)return '고3'; return m[a]||'';
}
function saveProfile(grade){
  if(!state.name) return;
  try{ localStorage.setItem('edupath_prof_'+state.name, JSON.stringify({age:state.age, year:new Date().getFullYear(), grade})); }catch(e){}
}
function checkPromotion(){
  const cur=new Date().getFullYear(); let best=null;
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i);
    if(!k || !k.startsWith('edupath_prof_')) continue;
    let p; try{ p=JSON.parse(localStorage.getItem(k)); }catch(e){ continue; }
    if(!p||!p.year) continue;
    const exAge=p.age+(cur-p.year), newG=gradeLabel(exAge);
    if(cur>p.year && newG && newG!==p.grade && (!best || p.year>best.p.year))
      best={ name:k.slice('edupath_prof_'.length), exAge, newG, p };
  }
  const el=$('#promoBanner');
  if(best){
    el.innerHTML=`🎉 <b>${esc(best.name)}</b>, 새 학년이 되었을 거예요 — <b>${best.newG}</b>. <u>새 학년 할 일 보기 →</u>`;
    el.style.display='block';
    el.onclick=()=>{ state.age=best.exAge; state.name=best.name; $('#childName').value=best.name; el.style.display='none'; setStep(1); loadPlan(); };
  } else el.style.display='none';
}

// 생애주기 타임라인
function lifecycleHTML(life){
  let s=`<div class="card"><h3>🌱 전 생애주기 — 우리 아이는 지금 '${esc(life.current_label)}'</h3><div class="life">`;
  life.stages.forEach(st=>{ s+=`<div class="lifeitem ${st.current?'cur':''}"><div class="ld"></div>
    <div><b>${esc(st.label)}</b> <span class="muted">${esc(st.age_label)}</span>${st.current?' 📍':''}
    <div class="muted">${esc(st.headline)}</div></div></div>`; });
  return s+`</div></div>`;
}

// 결과
async function showResult(){
  state.name=($('#childName').value||'').trim();
  const [plan,achv,rec,path,subj,ai,careers,life]=await Promise.all([
    post('/api/grade-plan'),post('/api/achievement'),post('/api/recommend'),
    post('/api/pathway'),post('/api/subjects'),post('/api/ai-track'),post('/api/careers'),post('/api/lifecycle')]);
  saveHistory(plan.grade); saveProfile(plan.grade);
  render(life,plan,achv,ai,careers,rec,path,subj); setStep(3);
}
function render(life,plan,achv,ai,careers,rec,path,subj){
  const I=rec.aptitude.interest, pw=path.pathway, topI=Object.entries(I).sort((a,b)=>b[1]-a[1]).slice(0,3);
  let h='';
  // 0) 생애주기 타임라인
  h+=lifecycleHTML(life);
  // 1) 학년별 할 일 (주 기능)
  h+=`<div class="card">${planHTML(plan)}</div>`;
  // 1.5) 성취도 이력 (있으면)
  h+=historyHTML();
  // 2) 과목 보완 추천 (무료·저렴 링크)
  h+=`<div class="card"><h3>📌 과목 보완 추천</h3><div class="muted">${achv.note}</div>`;
  if(achv.weak.length){
    achv.weak.forEach(w=>{
      h+=`<div class="rec"><div class="top"><span class="nm">${w.subject}</span><span class="lvlbadge ${w.level}">${w.level}</span></div>
        <div class="muted" style="margin:4px 0">${w.action}</div>
        <div style="margin-top:4px"><b style="font-size:12.5px;color:var(--free)">무료·저렴</b>
          ${w.free.map(o=>`<div class="opt-line">• ${optLink(o)} <span class="free-cost">${o.cost}</span> <span class="muted">${esc(o.note)}</span></div>`).join('')}</div>
        <div style="margin-top:4px"><b style="font-size:12.5px;color:var(--muted)">학원·인강</b>
          ${w.paid.map(o=>`<div class="opt-line">• ${optLink(o)} <span class="paid-cost">${o.cost}</span></div>`).join('')}</div>
      </div>`;
    });
  }
  if(achv.strong.length) h+=`<div class="muted" style="margin-top:6px">잘하는 과목: ${achv.strong.join(', ')} — 심화로 강점 키우기 👍</div>`;
  h+=`</div>`;
  // 3) AI 시대 역량
  h+=`<div class="card"><h3>🤖 AI 시대 역량 — ${ai.stage}</h3><div style="font-weight:700;font-size:14px">${ai.headline}</div>
    <ul class="glist">${ai.skills.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
    <div class="chips">${ai.tools.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>
    <div class="tip">💡 ${esc(ai.tip)}</div></div>`;
  // 4) 유망 커리어
  h+=`<div class="card"><h3>🚀 유망 커리어 추천</h3><div class="muted">${careers.note}</div>`;
  careers.careers.forEach(c=>{ h+=`<div class="rec"><div class="top"><span class="nm">${c.name}</span><span class="tag">${c.field}</span></div>
    <div class="muted">📈 ${c.outlook}</div>
    <ul class="reasons">${c.fit_reasons.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
    <div class="muted" style="margin-top:4px"><b>지금 준비:</b> ${c.prepare_now.join(', ')}</div>
    <div class="chips" style="margin-top:4px">${c.key_subjects.map(s=>`<span class="subj">${esc(s)}</span>`).join('')}</div></div>`; });
  h+=`</div>`;
  // 5) 마인드맵
  h+=`<div class="card"><h3>🧠 진로 마인드맵</h3>${mindmap(pw)}<div class="muted" style="margin-top:6px">${(pw.rationale||[]).join(' ')}</div></div>`;
  // 6) 적성
  h+=`<div class="card"><h3>🧭 우리 아이 적성</h3><div class="chips">`
    + topI.map((t,i)=>`<span class="chip ${i===0?'pri':''}">${RIASEC[t[0]]}</span>`).join('')+`</div><div class="riasec">`;
  Object.entries(I).forEach(([k,v])=>{ h+=`<div class="row"><span>${RIASEC[k]}</span><div class="bar"><i style="width:${Math.round(v*100)}%"></i></div></div>`; });
  h+=`</div><div class="mode">🎯 ${rec.study_mode}</div></div>`;
  // 7) 고교 과목 (고등만 강조, 그 외 참고)
  h+=`<div class="card"><h3>🎒 고교 과목 추천 <span class="muted">(2022 개정)</span></h3><div class="muted">${subj.note}</div>`;
  Object.entries(subj.groups).forEach(([t,list])=>{ if(!list.length)return;
    h+=`<div style="margin:8px 0"><div style="font-size:13px;font-weight:800;color:var(--pri-d);margin-bottom:6px">${t}</div>`
      +list.map(s=>`<span class="subj">${esc(s.name)}</span>`).join('')+`</div>`; });
  h+=`</div>`;
  $('#result').innerHTML=h;
}

// 이벤트
$('#toPlan').onclick=()=>{ setStep(1); loadPlan(); };
$('#toInput').onclick=()=>{ setStep(2); renderAchv(); if(!$('#actOpts').children.length) loadActivities(); };
$('#toResultDirect').onclick=()=>{ state.picks.clear(); state.achievements={}; showResult(); };
$('#back0').onclick=()=>setStep(0);
$('#back1').onclick=()=>setStep(1);
$('#toResult').onclick=showResult;
$('#restart').onclick=()=>{ state.picks.clear(); state.achievements={}; setStep(0); };

renderAges();
checkPromotion();
</script>
</body>
</html>
