<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>baby_predict — 우리 아기 맞춤 추천 (데모)</title>
  <style>
    :root { --pri:#5b8def; --bg:#f6f8fc; --card:#fff; --muted:#7a869a; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      margin:0; background:var(--bg); color:#1f2937; }
    header { background:var(--pri); color:#fff; padding:20px 16px; }
    header h1 { margin:0; font-size:20px; }
    header p { margin:6px 0 0; opacity:.9; font-size:13px; }
    main { max-width:720px; margin:0 auto; padding:16px; }
    .card { background:var(--card); border-radius:14px; padding:18px; margin:14px 0;
      box-shadow:0 1px 4px rgba(0,0,0,.06); }
    label { display:block; font-size:14px; margin:10px 0 4px; font-weight:600; }
    input, select { width:100%; padding:10px; border:1px solid #d8dee9; border-radius:8px; font-size:14px; }
    .q { margin:12px 0; }
    .q .qt { font-size:14px; margin-bottom:6px; }
    .scale { display:flex; gap:6px; }
    .scale button { flex:1; padding:8px 0; border:1px solid #d8dee9; background:#fff;
      border-radius:8px; cursor:pointer; font-size:13px; }
    .scale button.sel { background:var(--pri); color:#fff; border-color:var(--pri); }
    .go { width:100%; padding:14px; background:var(--pri); color:#fff; border:none;
      border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; margin-top:10px; }
    .rec { border-left:4px solid var(--pri); padding:10px 12px; margin:10px 0; background:#fbfcff; border-radius:8px; }
    .rec .top { display:flex; justify-content:space-between; align-items:baseline; }
    .rec .name { font-weight:700; }
    .tag { font-size:11px; padding:2px 8px; border-radius:10px; background:#eef3ff; color:var(--pri); }
    .reasons { margin:6px 0 0; padding-left:18px; color:var(--muted); font-size:12.5px; }
    .price { color:#111; font-weight:600; font-size:13px; }
    .meta { color:var(--muted); font-size:13px; }
    .bar { height:6px; background:#e8edf5; border-radius:4px; overflow:hidden; margin-top:4px; }
    .bar > i { display:block; height:100%; background:var(--pri); }
  </style>
</head>
<body>
  <header>
    <h1>👶 baby_predict</h1>
    <p>우리 아기 성향을 넣으면, 발달 단계에 맞는 국민템·놀이를 추천해드려요 (MVP 데모)</p>
  </header>
  <main>
    <div class="card">
      <label for="age">월령 (개월)</label>
      <input id="age" type="number" min="0" max="72" value="10" />
      <label for="budget">아이템당 최대 예산 (원, 비우면 제한 없음)</label>
      <input id="budget" type="number" min="0" placeholder="예: 100000" />
    </div>

    <div class="card">
      <h3 style="margin-top:0">성향 진단</h3>
      <div id="survey"><em class="meta">설문 불러오는 중…</em></div>
      <button class="go" onclick="submit()">추천 받기</button>
    </div>

    <div id="result"></div>
  </main>

  <script>
    const answers = {};
    let questions = [];

    async function loadSurvey() {
      const res = await fetch('/api/survey');
      const data = await res.json();
      questions = data.questions;
      const el = document.getElementById('survey');
      el.innerHTML = '';
      questions.forEach(q => {
        const wrap = document.createElement('div');
        wrap.className = 'q';
        const t = document.createElement('div'); t.className = 'qt'; t.textContent = q.text;
        const scale = document.createElement('div'); scale.className = 'scale';
        for (let v = 1; v <= 5; v++) {
          const b = document.createElement('button');
          b.textContent = v;
          b.onclick = () => {
            answers[q.id] = v;
            [...scale.children].forEach(c => c.classList.remove('sel'));
            b.classList.add('sel');
          };
          scale.appendChild(b);
        }
        wrap.appendChild(t); wrap.appendChild(scale); el.appendChild(wrap);
      });
    }

    const TYPE_LABEL = {
      national_pick: '국민템', temperament_match: '성향맞춤', developmental_play: '발달놀이'
    };

    async function submit() {
      const age = parseInt(document.getElementById('age').value || '0', 10);
      const budgetRaw = document.getElementById('budget').value;
      const survey = Object.entries(answers).map(([question_id, value]) => ({ question_id, value }));
      const body = { age_months: age, survey };
      if (budgetRaw) body.budget_max = parseInt(budgetRaw, 10);

      const res = await fetch('/api/recommend', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      const data = await res.json();
      render(data);
    }

    function render(data) {
      const r = document.getElementById('result');
      const tasks = (data.developmental_tasks || []).join(', ');
      let html = `<div class="card"><h3 style="margin-top:0">${data.age_band} 추천</h3>`;
      html += `<div class="meta">발달 과업: ${tasks || '-'}</div>`;
      (data.recommendations || []).forEach(rec => {
        html += `<div class="rec">
          <div class="top"><span class="name">${rec.name}</span>
            <span class="tag">${TYPE_LABEL[rec.type] || rec.type}</span></div>
          <div class="meta">${rec.category} · <span class="price">${rec.price.toLocaleString()}원</span></div>
          <div class="bar"><i style="width:${Math.round(rec.score*100)}%"></i></div>
          <ul class="reasons">${rec.reasons.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>`;
      });
      html += `</div>`;
      r.innerHTML = html;
      r.scrollIntoView({ behavior: 'smooth' });
    }

    loadSurvey();
  </script>
</body>
</html>
